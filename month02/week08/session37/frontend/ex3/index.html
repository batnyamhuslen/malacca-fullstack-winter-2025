<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Theme Page</title>

    <style>
        :root {
            --bg: #f4f4f4;
            --text: #222222;
            --header-bg: #ffffff;
            --card-bg: #ffffff;
            --footer-bg: #e0e0e0;
            --primary: #4CAF50;
            --button-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #f5f5f5;
            --header-bg: #1e1e1e;
            --card-bg: #2a2a2a;
            --footer-bg: #1a1a1a;
            --primary: #bb86fc;
            --button-text: #000000;
        }

        [data-theme="ocean"] {
            --bg: #e0f7fa;
            --text: #003344;
            --header-bg: #00acc1;
            --card-bg: #b2ebf2;
            --footer-bg: #00838f;
            --primary: #006064;
            --button-text: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: var(--header-bg);
            padding: 20px;
            text-align: center;
        }

        .theme-buttons {
            margin-top: 10px;
        }

        .theme-btn {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: var(--button-text);
            border-radius: 5px;
        }

        .main {
            padding: 40px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
        }

        footer {
            background: var(--footer-bg);
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>3 Theme Demo</h1>
        <div class="theme-buttons">
            <button class="theme-btn" data-theme="light">Light</button>
            <button class="theme-btn" data-theme="dark">Dark</button>
            <button class="theme-btn" data-theme="ocean">Ocean</button>
        </div>
    </header>

    <div class="main">
        <div class="card-grid">
            <div class="card">
                <h3>Card 1</h3>
                <p>Энэ бол эхний card.</p>
            </div>
            <div class="card">
                <h3>Card 2</h3>
                <p>Энэ бол хоёр дахь card.</p>
            </div>
            <div class="card">
                <h3>Card 3</h3>
                <p>Энэ бол гурав дахь card.</p>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Theme Demo
    </footer>

    <script>
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.documentElement.setAttribute('data-theme', btn.dataset.theme);
            });
        });
    </script>

</body>

</html>
