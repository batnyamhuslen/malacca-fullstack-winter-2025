<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design Жишээ</title>
  <style>
    /* Basic Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      background: #f2f2f2;
    }

    /* Heading: 2rem - 5rem, 5vw */
    h1 {
      font-size: clamp(2rem, 5vw, 5rem);
      margin-bottom: 2rem;
      text-align: center;
    }

    /* Container: 300px - 1000px, 85vw */
    .container {
      width: clamp(300px, 85vw, 1000px);
      background: #fff;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 4vw, 40px);
    }

    /* Card Example */
    .card {
      background: #e0e0e0;
      padding: 1rem;
      border-radius: 0.5rem;
      text-align: center;
      font-size: 1rem;
    }

    /* Button: padding 8px - 24px, 3vw */
    button {
      padding: clamp(8px, 3vw, 24px) clamp(16px, 4vw, 32px);
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      background: #0077ff;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #005fcc;
    }

    /* min() ба max() жишээ */
    .min-example {
      width: min(100%, 600px);
      background: #ffd700;
      padding: 1rem;
      text-align: center;
    }

    .max-example {
      min-height: max(44px, 3rem);
      background: #32cd32;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h1>Responsive Жишээ</h1>

  <div class="container">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>

    <button>Click Me</button>

    <div class="min-example">min() Жишээ (width)</div>
    <div class="max-example">max() Жишээ (height)</div>
  </div>

</body>
</html>
