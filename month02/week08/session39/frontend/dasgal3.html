<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive & Transitions Жишээ</title>
<style>
  /* Basic Reset */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2rem;
    background: #f5f5f5;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    text-align: center;
  }

  .responsive-image {
    width: min(100%, 800px);
    border-radius: 1rem;
    transition: transform 0.4s ease;
  }

  .responsive-image:hover {
    transform: scale(1.05);
  }

  /* 2. Button height: 44px эсвэл 4vh — max() ашигла */
  .btn {
    height: max(44px, 4vh);
    padding: 0 2rem;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
  }

  .btn:hover {
    background: #4f46e5;
    transform: scale(1.05);
  }

  /* 3. Text width: 60ch эсвэл 90% — min() ашигла */
  .text-box {
    width: min(60ch, 90%);
    background: #fff;
    padding: 1rem;
    border-radius: 0.5rem;
    text-align: center;
  }

  /* 4. Padding: 16px эсвэл 5vw — max() ашигла */
  .padded-box {
    padding: max(16px, 5vw);
    background: #e0e0e0;
    border-radius: 0.5rem;
    text-align: center;
    transition: background 0.3s ease, transform 0.3s ease;
  }

  .padded-box:hover {
    background: #d4d4ff;
    transform: translateY(-5px);
  }

  /* Card Example with hover */
  .card-container {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(10px, 4vw, 40px);
    justify-content: center;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
    width: min(300px, 90%);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.15);
  }

  .card__image {
    width: 100%;
    transition: transform 0.4s ease;
  }

  .card:hover .card__image {
    transform: scale(1.08);
  }

  .card__content {
    padding: max(16px, 5vw);
  }

</style>
</head>
<body>

<h1>Responsive & Transition Жишээ</h1>

<img src="https://via.placeholder.com/1200x600" alt="Responsive" class="responsive-image">

<button class="btn">Click Me</button>

<div class="text-box">
  Энэ бол текстын жишээ. Өргөн нь 60ch эсвэл дэлгэцийн 90% — аль нь бага бол түүнийг авна.
</div>

<div class="padded-box">
  Padding нь 16px эсвэл 5vw — аль нь их бол түүнийг авна.
</div>

<div class="card-container">
  <div class="card">
    <img class="card__image" src="https://via.placeholder.com/300x200" alt="Card 1">
    <div class="card__content">Card 1</div>
  </div>
  <div class="card">
    <img class="card__image" src="https://via.placeholder.com/300x200" alt="Card 2">
    <div class="card__content">Card 2</div>
  </div>
  <div class="card">
    <img class="card__image" src="https://via.placeholder.com/300x200" alt="Card 3">
    <div class="card__content">Card 3</div>
  </div>
</div>

</body>
</html>
