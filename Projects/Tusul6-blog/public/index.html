<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="search">

            <h2>My Blog</h2>
            <input id="input-result" type="text" placeholder="Filter posts...">

            <main>
                <div id="search-result"></div>
                <div id="sentinel" style="height: 20px;"></div>
                <div id="grid-container">
                    <div id="scroll-anchor"></div>
                    <div class="loading-container" id="loading-msg" style="display:none;">
                        <div class="circle"></div>
                        <div class="circle"></div>
                        <div class="circle"></div>
                    </div>
                </div>
            </main>

        </div>

    </div>

    <script src="./js/index.js"></script>
</body>

</html>
