<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeScript Full Curriculum Web UI</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #121212;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
      }
      .wrapper {
        max-width: 1100px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        color: #007acc;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1.5fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .card {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #333;
      }
      h3 {
        margin-top: 0;
        color: #007acc;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
      }
      input,
      select,
      button {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        box-sizing: border-box;
        border-radius: 4px;
        border: 1px solid #444;
        background: #2a2a2a;
        color: white;
      }
      button {
        background: #007acc;
        border: none;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #0062a3;
      }
      .inline {
        display: flex;
        gap: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      th {
        background: #252526;
        color: #007acc;
      }
      .log-box {
        background: #000;
        font-family: monospace;
        padding: 10px;
        border-radius: 4px;
        height: 120px;
        overflow-y: auto;
        color: #4af626;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>🎬 Sakila Movie Studio (Advanced TS Lab)</h1>

      <div class="grid">
        <!-- Left Side Controls Panel -->
        <div class="card">
          <h3>1. Add Film (Omit Example)</h3>
          <form id="filmForm">
            <input type="text" id="title" placeholder="Film Title" required />
            <select id="rating">
              <option value="G">G</option>
              <option value="PG">PG</option>
              <option value="PG-13">PG-13</option>
              <option value="R">R</option>
            </select>
            <input
              type="number"
              id="rate"
              placeholder="Rental Rate (e.g. 2.99)"
              step="0.01"
              required
            />
            <button type="submit">Save to Inventory</button>
          </form>

          <h3>2. Quick Update (Partial Example)</h3>
          <div class="inline">
            <input
              type="number"
              id="updateId"
              placeholder="ID"
              style="width: 30%"
            />
            <input
              type="number"
              id="updateRate"
              placeholder="New Rate"
              step="0.01"
              style="width: 70%"
            />
          </div>
          <button id="btnUpdate">Update Price</button>
        </div>

        <!-- Right Side Main Inventory Display -->
        <div class="card">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <h3>3. Main Database Storage</h3>
            <div style="margin-bottom: 5px">
              <label>Sort (keyof): </label>
              <select
                id="sortSelect"
                style="width: auto; display: inline-block; padding: 4px"
              >
                <option value="film_id">ID</option>
                <option value="title">Title</option>
                <option value="rental_rate">Rate</option>
              </select>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Rating</th>
                <th>Rate</th>
              </tr>
            </thead>
            <tbody id="inventoryTable"></tbody>
          </table>
        </div>
      </div>

      <div class="grid">
        <!-- Record Type Map Layout -->
        <div class="card">
          <h3>4. Category Mappings (Record & Pick Example)</h3>
          <div id="categoryContainer"></div>
        </div>

        <!-- Stack Operations View -->
        <div class="card">
          <h3>5. Internal App Mutation History (Generic Stack)</h3>
          <div class="log-box" id="stackLog"></div>
        </div>
      </div>
    </div>

    <!-- Direct entry reference linking the compiled output -->
    <script type="module" src="dist/app.js"></script>
  </body>
</html>
