<!-- product-manager.component.html -->
<div class="product-manager">
  <h2>Product Manager</h2>

  <!-- Filters -->
  <div class="filters">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      placeholder="Search products..."
      class="search-input">

    <select [(ngModel)]="selectedCategory">
      <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
    </select>

    <label>
      <input type="checkbox" [(ngModel)]="inStockOnly">
      In Stock Only
    </label>
  </div>

  <!-- Stats -->
  <div class="stats">
    <span>{{ filteredProducts.length }} products</span>
    <span>Total value: ${{ totalValue.toFixed(2) }}</span>
  </div>

  <!-- Product Grid -->
  <div class="product-grid">
    <div *ngFor="let product of filteredProducts; trackBy: trackById"
         class="product-card"
         [ngClass]="{'out-of-stock': !product.inStock}">
      <h3>{{ product.name }}</h3>
      <p class="price">${{ product.price }}</p>
      <p class="category">{{ product.category }}</p>
      <span [ngClass]="product.inStock ? 'badge-green' : 'badge-red'">
        {{ product.inStock ? 'In Stock' : 'Out of Stock' }}
      </span>
    </div>
  </div>

  <p *ngIf="filteredProducts.length === 0">No products found.</p>
</div>
