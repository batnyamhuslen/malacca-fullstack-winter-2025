<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chess Game - With Ending Rules</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>3D Chess Game</h1>
            <div class="game-info">
                <p>Current Turn: <span id="currentTurn">White</span></p>
                <p id="gameStatus" class="game-status"></p>
                <button id="resetBtn">Reset Game</button>
            </div>
        </div>
        
        <div class="chess-board-container">
            <div class="chess-board" id="chessBoard"></div>
        </div>
        
        <div class="game-log">
            <h3>Game Status:</h3>
            <div id="statusLog" class="status-log">Game started. White to move.</div>
        </div>
    </div>

    <script src="chess.js"></script>
</body>
</html>
