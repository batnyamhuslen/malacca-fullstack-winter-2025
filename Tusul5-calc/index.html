<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="./img/15175124_3840_2160_30fps.mp4" type="video/mp4">
    </video>

    <div class="calculator">
        <div class="header">
            <h1>Calc</h1>
            <div class="mode">
                <button id="dark-btn" class="mode-btn " data-theme="dark">
                    <!-- <img src="./img/night.svg" alt="night"> -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>

                <button id="light-btn" class="mode-btn" data-theme="light">
                    <!-- <img src="./img/day.svg" alt="day"> -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>

            </div>
        </div>

        <div class="display">
            <div class="top" id="top-display"></div>
            <div class="botton" id="botton-display">0</div>
        </div>

        <div class="keyboard">
            <button class="btn blue" onclick="clearAll()">AC</button>
            <button class="btn blue" onclick="backspace()">C</button>
            <button class="btn blue" onclick="setOp('%')">%</button>
            <button class="btn red" onclick="setOp('/')">÷</button>
            <button class="btn" onclick="addNum('7')">7</button>
            <button class="btn" onclick="addNum('8')">8</button>
            <button class="btn" onclick="addNum('9')">9</button>
            <button class="btn red" onclick="setOp('*')">×</button>
            <button class="btn" onclick="addNum('4')">4</button>
            <button class="btn" onclick="addNum('5')">5</button>
            <button class="btn" onclick="addNum('6')">6</button>
            <button class="btn red" onclick="setOp('-')">−</button>
            <button class="btn" onclick="addNum('1')">1</button>
            <button class="btn" onclick="addNum('2')">2</button>
            <button class="btn" onclick="addNum('3')">3</button>
            <button id="add" class="btn red" onclick="setOp('+')">+</button>
            <button class="btn span-2" onclick="addNum('0')">0</button>
            <button class="btn" onclick="addNum('.')">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>

    </div>
    <script src="./index.js"></script>
</body>

</html>
