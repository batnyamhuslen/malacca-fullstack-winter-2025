<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="calculator">
        <div class="header">
            <h1>Calc</h1>
            <div class="mode">
                <button id="dark-btn" class="mode-btn active" onclick="setTheme('dark')">
                    <img src="./img/night.svg" alt="night">
                    <button id="light-btn" class="mode-btn" onclick="setTheme('light')">
                        <img src="./img/day.svg" alt="day">
                    </button>
            </div>
        </div>

        <div class="display">
            <div class="top" id="top-display"></div>
            <div class="botton" id="botton-display">0</div>
        </div>

        <div class="keyboard">
            <button class="btn blue" onclick="clearAll()">AC</button>
            <button class="btn blue" onclick="backspace()">C</button>
            <button class="btn blue" onclick="setOp('%')">%</button>
            <button class="btn red" onclick="setOp('/')">÷</button>
            <button class="btn" onclick="addNum('7')">7</button>
            <button class="btn" onclick="addNum('8')">8</button>
            <button class="btn" onclick="addNum('9')">9</button>
            <button class="btn red" onclick="setOp('*')">×</button>
            <button class="btn" onclick="addNum('4')">4</button>
            <button class="btn" onclick="addNum('5')">5</button>
            <button class="btn" onclick="addNum('6')">6</button>
            <button class="btn red" onclick="setOp('-')">−</button>
            <button class="btn" onclick="addNum('1')">1</button>
            <button class="btn" onclick="addNum('2')">2</button>
            <button class="btn" onclick="addNum('3')">3</button>
            <button class="btn red" onclick="setOp('+')">+</button>
            <button class="btn span-2" onclick="addNum('0')">0</button>
            <button class="btn" onclick="addNum('.')">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>

    </div>
    <script src="./index.js"></script>
</body>

</html>
