<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">
        <div class="profile-card">
            <div class="avatar-container">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="avatar">
                <div class="status-indicator"></div>
            </div>
            
            <div class="info">
                <h1>Global Elite</h1>
                <p>Status: <span id="status-text">In Lobby</span></p>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <span>Win Rate</span>
                    <strong>64%</strong>
                </div>
                <div class="stat-box">
                    <span>HS%</span>
                    <strong>52%</strong>
                </div>
            </div>

            <button id="play-btn">START MATCH</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
